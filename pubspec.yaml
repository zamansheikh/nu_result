##Gplay Icon
icons_launcher:
  image_path: "gassets/CGPAViZ.png"
  platforms:
    android:
      enable: true
      notification_image: "gassets/CGPAViZ_foreground.png"
      # adaptive_background_color: '#ffffff'
      adaptive_background_image: "gassets/CGPAViZ_background.png"
      adaptive_foreground_image: "gassets/CGPAViZ_foreground.png"
      adaptive_monochrome_image: "gassets/CGPAViZ_monochrome.png"
    ios:
      enable: true

